<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Leicam84 Wine App Favicon</title>
  <desc id="desc">Minimalist wine glass favicon for Leicam84 wine app.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A0925"/>
      <stop offset="55%" stop-color="#4B0619"/>
      <stop offset="100%" stop-color="#21040B"/>
    </linearGradient>

    <linearGradient id="wine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C01945"/>
      <stop offset="60%" stop-color="#7D0827"/>
      <stop offset="100%" stop-color="#3A0512"/>
    </linearGradient>

    <linearGradient id="cream" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="100%" stop-color="#E2D0AA"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Bowl outline -->
    <path d="M166 92 C138 168 143 257 196 307 C212 322 228 330 243 335 L243 412 L202 420 C196 421 196 431 203 431 L309 431 C316 431 316 421 310 420 L269 412 L269 335 C284 330 300 322 316 307 C369 257 374 168 346 92" 
          fill="none" stroke="url(#cream)" stroke-width="25" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Wine liquid -->
    <path d="M175 229 C211 188 267 275 337 217 C331 263 302 302 256 306 C217 309 187 284 175 229 Z" fill="url(#wine)"/>
    <path d="M175 229 C211 188 267 275 337 217" fill="none" stroke="#FFF5DE" stroke-width="16" stroke-linecap="round"/>

    <!-- subtle highlight -->
    <path d="M196 241 C202 271 222 290 249 298" fill="none" stroke="#F4B3BE" stroke-width="10" stroke-linecap="round" opacity="0.28"/>

    <!-- Monogram 84 -->
    <text x="256" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="-4" fill="#FFF4DD" opacity="0.92">84</text>
  </g>
</svg>
